<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaydol - TaşıTır</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header>
        <div class="container logo-center">
            <a href="index.html" class="logo-area">
                <img src="images/logo.png" alt="TaşıTır Logo">
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2 class="register-title">Aramıza Katıl</h2>
            <form>
                <div class="input-group">
                    <label>Hesap Türü</label>
                    <select>
                        <option value="yuk-sahibi">Yük Sahibiyim (Yüküm Var)</option>
                        <option value="sofor">Tır Şoförüyüm (Araç Sahibiyim)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Ad Soyad</label>
                    <input type="text" placeholder="Adınız Soyadınız" required>
                </div>
                <div class="input-group">
                    <label>Telefon</label>
                    <input type="tel" placeholder="0555 123 45 67" required>
                </div>
                <div class="input-group">
                    <label>E-Posta</label>
                    <input type="email" placeholder="ornek@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Şifre Oluştur</label>
                    <input type="password" placeholder="******" required>
                </div>
                <button type="submit" class="btn-submit orange-btn">Ücretsiz Kaydol</button>
            </form>
            <p class="bottom-text">
                Zaten üye misiniz? <a href="login.html">Giriş Yapın</a>
            </p>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
