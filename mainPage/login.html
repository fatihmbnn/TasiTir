<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - TaşıTır</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header>
        <div class="container logo-center">
            <a href="index.html" class="logo-area">
                <img src="images/logo.png" alt="TaşıTır Logo">
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Giriş Yap</h2>
            <form>
                <div class="input-group">
                    <label>E-Posta Adresi</label>
                    <input type="email" placeholder="ornek@mail.com" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" placeholder="******" required>
                </div>
                <button type="submit" class="btn-submit">Giriş Yap</button>
            </form>
            <p class="bottom-text">
                Hesabınız yok mu? <a href="register.html">Hemen Kaydol</a>
            </p>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
